name: Facebook Auto Upload

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  facebook-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq
        pip install gdown requests

    - name: Restore used cuts
      uses: actions/cache@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
        restore-keys: |
          fb-used-cuts-

    - name: Download video from Google Drive
      run: |
        echo "🍂 Downloading Vikings S1E1..."
        gdown "https://drive.google.com/uc?id=1GXi0sXcYcSe6GjGr76Y2cf9eqQyZ_MbD" -O source_video.mp4 --fuzzy

    - name: Get video duration
      id: duration
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4 | cut -d. -f1)
        echo "duration=$DURATION" >> $GITHUB_OUTPUT
        echo "🍂 Video duration: $DURATION seconds"

    - name: Find unused cut position
      id: cut
      run: |
        DURATION=${{ steps.duration.outputs.duration }}
        MAX_START=$((DURATION - 60))
        
        touch used_cuts.txt
        USED_COUNT=$(wc -l < used_cuts.txt)
        echo "🍂 Used cuts: $USED_COUNT"
        
        while true; do
          START_TIME=$((RANDOM % MAX_START))
          if ! grep -q "^$START_TIME$" used_cuts.txt; then
            echo "$START_TIME" >> used_cuts.txt
            break
          fi
        done
        
        START_FORMATTED=$(printf "%02d:%02d:%02d" $((START_TIME/3600)) $(((START_TIME%3600)/60)) $((START_TIME%60)))
        echo "🍂 Cutting at $START_FORMATTED (unique position)"
        
        ffmpeg -i source_video.mp4 -ss "$START_FORMATTED" -t 60 -c:v libx264 -c:a aac -preset fast -y output.mp4
        echo "start_time=$START_TIME" >> $GITHUB_OUTPUT

    - name: Extract frames for analysis
      run: |
        ffmpeg -i output.mp4 -ss 5 -vframes 1 -y frame1.jpg
        ffmpeg -i output.mp4 -ss 20 -vframes 1 -y frame2.jpg
        ffmpeg -i output.mp4 -ss 40 -vframes 1 -y frame3.jpg

    - name: Generate creative caption with Gemini
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        FRAME1_B64=$(base64 -w 0 frame1.jpg)
        FRAME2_B64=$(base64 -w 0 frame2.jpg)
        FRAME3_B64=$(base64 -w 0 frame3.jpg)
        
        cat > payload.json << EOF
        {
          "contents": [{
            "parts": [
              {"text": "Analisis video pendek 60 detik dari VIKINGS Season 1 Episode 1. Berdasarkan 3 frame:\n\n1. BUAT JUDUL EPIC dalam bahasa Indonesia (max 60 karakter)\n2. BUAT CAPTION FACEBOOK engaging + 5-8 hashtag\n\nFormat:\nJUDUL: ...\nCAPTION: ..."},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME1_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME2_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME3_B64}"}}
            ]
          }],
          "generationConfig": {
            "temperature": 0.95,
            "maxOutputTokens": 300
          }
        }
        EOF
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d @payload.json > caption.json
        
        FULL_TEXT=$(jq -r '.candidates[0].content.parts[0].text' caption.json)
        TITLE=$(echo "$FULL_TEXT" | grep -oP 'JUDUL: \K[^\n]+' | head -1)
        CAPTION=$(echo "$FULL_TEXT" | grep -oP 'CAPTION: \K[^\n]+' | head -1)
        
        echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        echo "CAPTION=$CAPTION" >> $GITHUB_OUTPUT

    - name: Upload to Facebook
      env:
        FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: "104884774466325"
        CAPTION: ${{ steps.caption.outputs.CAPTION }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        python3 << 'EOF'
        import requests, os
        token = os.environ.get("FB_TOKEN")
        page_id = os.environ.get("FB_PAGE_ID")
        caption = os.environ.get("CAPTION")
        title = os.environ.get("TITLE")
        full_caption = f"{title}\n\n{caption}" if title else caption

        with open("output.mp4", "rb") as f:
            response = requests.post(
                f"https://graph.facebook.com/v18.0/{page_id}/videos",
                data={"description": full_caption, "access_token": token},
                files={"source": f},
                timeout=120
            )
        print(response.json())
        EOF

    - name: Send Telegram notification
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="🔥 Facebook Vikings Upload: ${TITLE}" > /dev/null

    - name: Save used cuts
      if: always()
      uses: actions/cache/save@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
