name: TikTok Auto Upload

on:
  schedule:
    - cron: '0 12 * * *'   # 19:00 WIB
    - cron: '0 23 * * *'   # 06:00 WIB
  workflow_dispatch:

jobs:
  tiktok-upload:
    runs-on: ubuntu-latest
    name: Upload to @reemaas62

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq
        pip install gdown requests

    - name: Download video from Google Drive
      run: |
        echo "Downloading video..."
        gdown "https://drive.google.com/uc?id=1NCYonDGrVwHsSXvN_6gr6GEWWge3HaHy" -O source_video.mp4

    - name: Extract video frame
      run: |
        ffmpeg -i source_video.mp4 -ss 10 -vframes 1 -y video_frame.jpg

    - name: Analyze video with Gemini
      id: analysis
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        BASE64=$(base64 -w 0 video_frame.jpg)

        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts": [
                {"text": "Deskripsikan video ini dalam 1 kalimat singkat (max 20 kata)"},
                {"inline_data": {"mime_type": "image/jpeg", "data": "'"${BASE64}"'"}}
              ]
            }]
          }' > analysis.json

        jq -r '.candidates[0].content.parts[0].text' analysis.json > video_desc.txt
        echo "DESC=$(cat video_desc.txt)" >> $GITHUB_OUTPUT

    - name: Cut video to 60 seconds
      id: cut
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4)
        MAX_START=$(echo "$DURATION - 60" | bc)
        START_TIME=$(awk -v min=0 -v max=$MAX_START 'BEGIN{srand(); print min+rand()*(max-min)}')

        ffmpeg -i source_video.mp4 -ss $START_TIME -t 60 -c:v libx264 -c:a aac -preset fast -y output.mp4
        echo "START_TIME=$START_TIME" >> $GITHUB_OUTPUT

    - name: Generate TikTok caption
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        DESCRIPTION="${{ steps.analysis.outputs.DESC }}"

        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts": [{
                "text": "Buat 1 caption TikTok dalam bahasa Indonesia berdasarkan video ini: '"${DESCRIPTION}"'. Sertakan emoji dan 5 hashtag. Langsung captionnya aja tanpa kata lain."
              }]
            }],
            "generationConfig": {
              "temperature": 0.9,
              "maxOutputTokens": 100
            }
          }' > caption.json

        CAPTION=$(jq -r '.candidates[0].content.parts[0].text' caption.json)
        if [[ "$CAPTION" == "null" || -z "$CAPTION" ]]; then
          CAPTION="Daily vibes #fyp #viral #tiktok #indonesia #daily"
        fi

        echo "$CAPTION" > final_caption.txt
        echo "CAPTION<<EOF" >> $GITHUB_OUTPUT
        cat final_caption.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Kirim video ke Telegram
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CAPTION: ${{ steps.caption.outputs.CAPTION }}
      run: |
        echo "Mengirim video ke Telegram..."
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendVideo" \
          -F chat_id="${CHAT_ID}" \
          -F video="@output.mp4" \
          -F caption="${CAPTION}" && echo "Video terkirim"
        
        echo "Mengirim file caption ke Telegram..."
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
          -F chat_id="${CHAT_ID}" \
          -F document="@final_caption.txt" && echo "File caption terkirim"

    - name: Upload to Facebook
      env:
        FB_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        FB_PAGE_ID: "100071696370546"
        CAPTION: ${{ steps.caption.outputs.CAPTION }}
      run: |
        echo "🚀 Memulai upload ke Facebook..."
        echo "Page ID: $FB_PAGE_ID"
        echo "Caption: $CAPTION"
        echo "Token length: ${#FB_TOKEN} karakter"
        
        python3 << 'EOF'
        import requests
        import os
        import sys

        token = os.environ.get("FB_TOKEN", "")
        page_id = os.environ.get("FB_PAGE_ID", "")
        caption = os.environ.get("CAPTION", "")

        if not token:
            print("❌ ERROR: Token tidak ditemukan!")
            sys.exit(1)

        if not page_id:
            print("❌ ERROR: Page ID tidak ditemukan!")
            sys.exit(1)

        print(f"📤 Uploading video ke page {page_id}...")
        print(f"📝 Caption: {caption[:50]}...")

        url = f"https://graph.facebook.com/v18.0/{page_id}/videos"

        try:
            with open("output.mp4", "rb") as f:
                response = requests.post(
                    url,
                    data={
                        "description": caption,
                        "access_token": token
                    },
                    files={"source": f},
                    timeout=120
                )

            result = response.json()
            print("📦 Response dari Facebook:", result)

            if "id" in result:
                print("✅✅✅ UPLOAD KE FACEBOOK BERHASIL!")
                print(f"🎬 Video ID: {result['id']}")
                sys.exit(0)
            else:
                print("❌❌❌ UPLOAD GAGAL!")
                if "error" in result:
                    error = result["error"]
                    print(f"🔴 Kode Error: {error.get('code', 'N/A')}")
                    print(f"🔴 Pesan: {error.get('message', 'N/A')}")
                    print(f"🔴 Type: {error.get('type', 'N/A')}")
                sys.exit(1)

        except Exception as e:
            print(f"❌ Exception terjadi: {str(e)}")
            sys.exit(1)
        EOF

    - name: Status Upload Facebook
      if: always()
      run: |
        echo "✅ Step upload Facebook selesai"
