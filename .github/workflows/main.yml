name: TikTok Auto Upload

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  tiktok-upload:
    runs-on: ubuntu-latest
    name: Upload to @reemaas62
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install gdown
    
    - name: Download video from Google Drive
      run: |
        echo "Downloading video from Google Drive..."
        gdown "https://drive.google.com/uc?id=1NCYonDGrVwHsSXvN_6gr6GEWWge3HaHy" -O source_video.mp4
    
    - name: Extract video frame for analysis
      id: frame
      run: |
        # Ambil screenshot di detik ke-10
        ffmpeg -i source_video.mp4 -ss 10 -vframes 1 -y video_frame.jpg
        echo "Frame berhasil diambil"
    
    - name: Analyze video with Gemini
      id: video_analysis
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Encode frame ke base64
        BASE64=$(base64 -w 0 video_frame.jpg)
        
        # Kirim ke Gemini buat analisis
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts": [
                {"text": "Deskripsikan video ini secara singkat (max 50 kata). Fokus pada aktivitas, suasana, dan elemen visual utama."},
                {"inline_data": {"mime_type": "image/jpeg", "data": "'"${BASE64}"'"}}
              ]
            }]
          }' > analysis.json
        
        # Parse deskripsi
        DESCRIPTION=$(jq -r '.candidates[0].content.parts[0].text' analysis.json)
        echo "$DESCRIPTION" > video_description.txt
    
    - name: Cut video to 60 seconds
      id: cut
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4)
        MAX_START=$(echo "$DURATION - 60" | bc)
        START_TIME=$(awk -v min=0 -v max=$MAX_START 'BEGIN{srand(); print min+rand()*(max-min)}')
        
        ffmpeg -i source_video.mp4 -ss $START_TIME -t 60 -c:v libx264 -c:a aac -preset fast -y output.mp4
        echo "START_TIME=$START_TIME" >> $GITHUB_OUTPUT
    
    - name: Generate TikTok caption
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        DESCRIPTION=$(cat video_description.txt)
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts": [{
                "text": "Buat 1 caption TikTok dalam bahasa Indonesia berdasarkan deskripsi video ini: '"${DESCRIPTION}"'. Gunakan bahasa gaul kekinian, sertakan emoji yang relevan, dan 5-7 hashtag. Langsung captionnya aja tanpa penjelasan lain."
              }]
            }],
            "generationConfig": {"temperature": 0.9, "maxOutputTokens": 150}
          }' > caption.json
        
        CAPTION=$(jq -r '.candidates[0].content.parts[0].text' caption.json)
        echo "$CAPTION" > final_caption.txt
        echo "CAPTION<<EOF" >> $GITHUB_OUTPUT
        cat final_caption.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Kirim video ke Telegram
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CAPTION: ${{ steps.caption.outputs.CAPTION }}
      run: |
        # Kirim video dengan caption
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendVideo" \
          -F chat_id="${CHAT_ID}" \
          -F video=@output.mp4 \
          -F caption="${CAPTION}" \
          -F parse_mode="HTML"
        
        echo "Video sudah dikirim ke Telegram!"
    
    - name: Kirim file caption terpisah (cadangan)
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Kirim file txt caption
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
          -F chat_id="${CHAT_ID}" \
          -F document=@final_caption.txt \
          -F caption="Caption backup - $(date)"
    
    - name: Kirim info tambahan
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        MESSAGE="Video siap upload ke @reemaas62
Start time: ${{ steps.cut.outputs.START_TIME }} detik
Waktu: $(date)

Caption udah termasuk di video, tinggal upload aja ke TikTok"
        
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="$MESSAGE"
